# Blueprint do Render (https://render.com/docs/blueprint-spec) — cria só a Api; o banco e o
# armazenamento de arquivos ficam no Supabase (ver GUIA_DEPLOY_RENDER.md). As variáveis marcadas
# `sync: false` precisam ser preenchidas manualmente no painel do Render depois do Apply — são
# segredos que vêm do painel do Supabase, o Render não tem como gerar sozinho.
services:
  # name (camdas-api) e a chave ConnectionStrings__Camdas propositalmente NÃO renomeados pra
  # BellucSketch: name é a URL já publicada do serviço no Render (renomear criaria um serviço NOVO
  # ou quebraria a URL que o app já usa, ver ConfiguracaoApi.BaseUrl no Mobile); a connection string
  # é um segredo `sync: false` já preenchido manualmente no painel com a string real do Supabase —
  # mudar o nome da chave aqui não migra esse valor, a Api subiria sem achar o banco.
  - type: web
    name: camdas-api
    runtime: docker
    dockerfilePath: ./src/BellucSketch.Api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Chave
        generateValue: true
      - key: Jwt__Emissor
        value: BellucSketch.Api
      - key: Jwt__Audiencia
        value: BellucSketch.Clientes
      - key: Jwt__ExpiracaoMinutos
        value: "480"
      - key: ConnectionStrings__Camdas
        sync: false
      - key: ArmazenamentoArquivos__Tipo
        value: S3
      - key: ArmazenamentoArquivos__S3__EndpointUrl
        sync: false
      - key: ArmazenamentoArquivos__S3__Region
        sync: false
      - key: ArmazenamentoArquivos__S3__Bucket
        sync: false
      - key: ArmazenamentoArquivos__S3__AccessKey
        sync: false
      - key: ArmazenamentoArquivos__S3__SecretKey
        sync: false

  # BellucSketch.Web (Blazor WebAssembly) publicado como Static Site — instala o SDK .NET
  # manualmente no build porque a imagem de Static Site do Render não vem com .NET pré-instalado.
  # name (camdas-web) propositalmente NÃO renomeado — é a URL já publicada do site, ver comentário
  # equivalente no serviço da Api acima.
  - type: web
    name: camdas-web
    runtime: static
    buildCommand: >-
      curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 8.0 --install-dir $HOME/.dotnet &&
      export PATH="$HOME/.dotnet:$PATH" &&
      dotnet workload install wasm-tools &&
      dotnet nuget locals http-cache --clear &&
      dotnet nuget locals global-packages --clear &&
      dotnet publish src/BellucSketch.Web/BellucSketch.Web.csproj -c Release -o publish_output
    staticPublishPath: ./publish_output/wwwroot
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
